name: impacgo_chain
description: "IMPACGO Chain - Enterprise Supply Chain Management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Responsive
  flutter_staggered_grid_view: ^0.7.0

  # Animation / motion
  flutter_animate: ^4.5.2

  # Typography / icons
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  flutter_feather_icons: ^2.0.0+1

  # Formatting
  intl: ^0.19.0

  # Storage
  shared_preferences: ^2.3.4

  # Pickers
  file_picker: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
